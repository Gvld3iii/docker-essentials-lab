services:

  api:
    build: .
    container_name: docker-lab-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: docker-lab-redis
    ports:
      - "6379:6379"
    restart: always

  db:
    image: postgres:16
    container_name: docker-lab-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: